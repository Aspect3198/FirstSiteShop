<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Інтернет-магазин</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Інтернет-магазин</h1>

    <nav>
        <a href="#">Головна</a>
        <a href="#">Каталог</a>
        <a href="#">Кошик</a>
        <a href="#">Контакти</a>
        <a href="#">Увійти</a>
    </nav>
</header>

<main>

<h2>Популярні товари</h2>

<div class="products">

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="товар">
        <h3>Смартфон</h3>
        <p>Ціна: 12000 грн</p>
        <button>Додати в кошик</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="товар">
        <h3>Ноутбук</h3>
        <p>Ціна: 25000 грн</p>
        <button>Додати в кошик</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="товар">
        <h3>Навушники</h3>
        <p>Ціна: 2000 грн</p>
        <button>Додати в кошик</button>
    </div>

</div>

</main>

<footer>
    <p>© 2026 Інтернет-магазин</p>
</footer>

</body>
</html>
